name: Fetch Latest ArXiv Papers

on:
  schedule:
    # Run daily at 8:00 AM UTC (4:00 PM Beijing)
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ArXiv fetcher
        run: python scripts/fetch_arxiv.py

      - name: Commit and push if changed
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --staged --quiet || (git commit -m "🔄 Auto-update latest papers from ArXiv" && git push)
